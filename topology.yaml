# SANJEEVANI simulation map
#
#                    [ SATELLITE ]  (covers everyone, weather-sensitive)
#                          |
#        ----------------------------------------
#        |                                      |
#  [cell_tower_1]  north                 [cell_tower_2]  south
#     covers: pod1, pod2                    covers: pod3, pod4
#
#   pod1 ---- pod2 ---- pod3 ---- pod4     <-- URWB mesh chain (max 2 hops)
#
# In production, coverage comes from RF planning; here it is declared.
# Pods only know their relay URLs and neighbors — they can NEVER reach
# the control center directly. Stop a relay container = that path is dead.

satellite:
  name: satellite
  covers: [pod1, pod2, pod3, pod4]
  latency_ms: 80          # LEO round trip
  note: primary backhaul, rain-fade prone (simulate with /set?loss=0.4)

cell_towers:
  cell_tower_1:
    covers: [pod1, pod2]
    latency_ms: 30
  cell_tower_2:
    covers: [pod3, pod4]
    latency_ms: 30

pods:
  pod1: { site: "Riverside School Shelter",  zone: north, neighbors: [pod2] }
  pod2: { site: "Community Hall Shelter",    zone: north, neighbors: [pod1, pod3] }
  pod3: { site: "District Hospital Camp",    zone: south, neighbors: [pod2, pod4] }
  pod4: { site: "Hilltop Relief Center",     zone: south, neighbors: [pod3] }
