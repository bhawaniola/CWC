services:
  mongodb:
    image: mongo:7
    container_name: sanjeevani-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - sanjeevani-net

  cloud-api:
    build: ./Command-Center/Backend
    container_name: sanjeevani-cloud-api
    depends_on:
      - mongodb
    ports:
      - "9000:9000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/sanjeevani-command-center
      POD_URLS: "POD-01=http://pod-01:8000,POD-02=http://pod-02:8000,POD-03=http://pod-03:8000,POD-04=http://pod-04:8000,POD-05=http://pod-05:8000,POD-06=http://pod-06:8000,POD-07=http://pod-07:8000,POD-08=http://pod-08:8000,POD-09=http://pod-09:8000,POD-10=http://pod-10:8000"
      SATELLITE_URL: http://satellite:9100
      CELL_TOWER_URLS: "CELLTOWER-1=http://celltower-1:9201,CELLTOWER-2=http://celltower-2:9202"
      COORDINATOR_URLS: "FIRE-01|FireDept|fire|http://fire-coordinator:8000|CELLTOWER-1;HOSPITAL-01|Hospital1|hospital|http://hospital-1-coordinator:8000|CELLTOWER-1;HOSPITAL-02|Hospital2|hospital|http://hospital-2-coordinator:8000|;SHELTER-A|ShelterCampA|shelter|http://shelter-a-coordinator:8000|;SHELTER-B|ShelterCampB|shelter|http://shelter-b-coordinator:8000|CELLTOWER-1;SHELTER-C|ShelterCamp2|shelter|http://shelter-c-coordinator:8000|CELLTOWER-2;WORKFORCE-01|WorkForceCamp1|workforce|http://workforce-1-coordinator:8000|CELLTOWER-2;WORKFORCE-02|WorkForceCamp2|workforce|http://workforce-2-coordinator:8000|CELLTOWER-2;FLOOD-01|FloodRescueDept|flood|http://flood-coordinator-1:8000|"
    networks:
      - sanjeevani-net

  satellite:
    build: ./link-node
    container_name: sanjeevani-satellite
    depends_on:
      - cloud-api
    ports:
      - "9100:9100"
    environment:
      LINK_ID: satellite
      LINK_TYPE: satellite
      PORT: 9100
      CLOUD_URL: http://cloud-api:9000
    networks:
      - sanjeevani-net

  celltower-1:
    build: ./link-node
    container_name: sanjeevani-celltower-1
    depends_on:
      - cloud-api
    ports:
      - "9201:9201"
    environment:
      LINK_ID: CELLTOWER-1
      LINK_TYPE: cellular
      PORT: 9201
      CLOUD_URL: http://cloud-api:9000
    networks:
      - sanjeevani-net

  celltower-2:
    build: ./link-node
    container_name: sanjeevani-celltower-2
    depends_on:
      - cloud-api
    ports:
      - "9202:9202"
    environment:
      LINK_ID: CELLTOWER-2
      LINK_TYPE: cellular
      PORT: 9202
      CLOUD_URL: http://cloud-api:9000
    networks:
      - sanjeevani-net

  simulation-controller:
    build: ./simulation-controller
    container_name: sanjeevani-simulation-controller
    depends_on:
      - satellite
      - celltower-1
      - celltower-2
    ports:
      - "9300:9300"
    environment:
      SATELLITE_URL: http://satellite:9100
      CELLTOWER_1_URL: http://celltower-1:9201
      CELLTOWER_2_URL: http://celltower-2:9202
      SATELLITE_CONTAINER: sanjeevani-satellite
      CELLTOWER_1_CONTAINER: sanjeevani-celltower-1
      CELLTOWER_2_CONTAINER: sanjeevani-celltower-2
      DOCKER_SOCKET: /var/run/docker.sock
      SENSOR_SIMULATOR_URL: http://sensor-simulator:9400
      INFRA_CONTROL_KEY: sanjeevani-infra-demo-key
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - sanjeevani-net

  command-center:
    build: ./Command-Center/Frontend
    container_name: sanjeevani-command-center
    depends_on:
      - cloud-api
      - simulation-controller
    ports:
      - "9400:9400"
    environment:
      PORT: 9400
      CLOUD_URL: http://cloud-api:9000
      CLOUD_SOCKET_URL: http://cloud-api:9000
      SIMULATION_CONTROLLER_URL: http://simulation-controller:9300
      INFRA_CONTROL_KEY: sanjeevani-infra-demo-key
      POD_URLS: "POD-01=http://pod-01:8000,POD-02=http://pod-02:8000,POD-03=http://pod-03:8000,POD-04=http://pod-04:8000,POD-05=http://pod-05:8000,POD-06=http://pod-06:8000,POD-07=http://pod-07:8000,POD-08=http://pod-08:8000,POD-09=http://pod-09:8000,POD-10=http://pod-10:8000"
    networks:
      - sanjeevani-net

  pod-01:
    build: ./pod-agent
    container_name: sanjeevani-pod-01
    depends_on: &pod_dependencies
      - cloud-api
      - satellite
      - celltower-1
      - celltower-2
      - simulation-controller
    ports:
      - "8001:8000"
    environment:
      POD_ID: POD-01
      POD_NAME: District Command Pod
      POD_REGION: Region-01
      SATELLITE_URL: http://satellite:9100
      CELL_TOWERS: CELLTOWER-1=http://celltower-1:9201
      CONNECTED_TOWERS: CELLTOWER-1
      NEIGHBORS: http://pod-02:8000
      SIMULATION_CONTROLLER_URL: http://simulation-controller:9300
      COORDINATOR_INBOXES: shelter=http://shelter-a-coordinator:8000
    volumes:
      - ./pod-data/pod-01:/app/data
    networks:
      - sanjeevani-net

  pod-02:
    build: ./pod-agent
    container_name: sanjeevani-pod-02
    depends_on: *pod_dependencies
    ports:
      - "8002:8000"
    environment:
      POD_ID: POD-02
      POD_NAME: Hospital Relief Pod
      POD_REGION: Region-02
      SATELLITE_URL: http://satellite:9100
      CELL_TOWERS: CELLTOWER-1=http://celltower-1:9201
      CONNECTED_TOWERS: CELLTOWER-1
      NEIGHBORS: http://pod-01:8000,http://pod-03:8000
      SIMULATION_CONTROLLER_URL: http://simulation-controller:9300
      COORDINATOR_INBOXES: hospital=http://hospital-1-coordinator:8000
    volumes:
      - ./pod-data/pod-02:/app/data
    networks:
      - sanjeevani-net

  pod-03:
    build: ./pod-agent
    container_name: sanjeevani-pod-03
    depends_on: *pod_dependencies
    ports:
      - "8003:8000"
    environment:
      POD_ID: POD-03
      POD_NAME: School Shelter Pod
      POD_REGION: Region-03
      SATELLITE_URL: http://satellite:9100
      CELL_TOWERS: CELLTOWER-1=http://celltower-1:9201
      CONNECTED_TOWERS: CELLTOWER-1
      NEIGHBORS: http://pod-02:8000
      SIMULATION_CONTROLLER_URL: http://simulation-controller:9300
    volumes:
      - ./pod-data/pod-03:/app/data
    networks:
      - sanjeevani-net

  pod-04:
    build: ./pod-agent
    container_name: sanjeevani-pod-04
    depends_on: *pod_dependencies
    ports:
      - "8004:8000"
    environment:
      POD_ID: POD-04
      POD_NAME: Riverbank Village Pod
      POD_REGION: Region-04
      SATELLITE_URL: http://satellite:9100
      CELL_TOWERS: ""
      CONNECTED_TOWERS: ""
      NEIGHBORS: http://pod-05:8000
      SIMULATION_CONTROLLER_URL: http://simulation-controller:9300
      COORDINATOR_INBOXES: hospital=http://hospital-2-coordinator:8000;shelter=http://shelter-a-coordinator:8000
    volumes:
      - ./pod-data/pod-04:/app/data
    networks:
      - sanjeevani-net

  pod-05:
    build: ./pod-agent
    container_name: sanjeevani-pod-05
    depends_on: *pod_dependencies
    ports:
      - "8005:8000"
    environment:
      POD_ID: POD-05
      POD_NAME: Evacuation Route Pod
      POD_REGION: Region-05
      SATELLITE_URL: http://satellite:9100
      CELL_TOWERS: CELLTOWER-1=http://celltower-1:9201
      CONNECTED_TOWERS: CELLTOWER-1
      NEIGHBORS: http://pod-04:8000
      SIMULATION_CONTROLLER_URL: http://simulation-controller:9300
      COORDINATOR_INBOXES: shelter=http://shelter-a-coordinator:8000;fire=http://fire-coordinator:8000
    volumes:
      - ./pod-data/pod-05:/app/data
    networks:
      - sanjeevani-net

  pod-06:
    build: ./pod-agent
    container_name: sanjeevani-pod-06
    depends_on: *pod_dependencies
    ports:
      - "8006:8000"
    environment:
      POD_ID: POD-06
      POD_NAME: Remote Village Pod
      POD_REGION: Region-06
      SATELLITE_URL: http://satellite:9100
      CELL_TOWERS: ""
      CONNECTED_TOWERS: ""
      NEIGHBORS: ""
      SIMULATION_CONTROLLER_URL: http://simulation-controller:9300
      COORDINATOR_INBOXES: hospital=http://hospital-1-coordinator:8000;shelter=http://shelter-b-coordinator:8000;flood=http://flood-coordinator-1:8000
    volumes:
      - ./pod-data/pod-06:/app/data
    networks:
      - sanjeevani-net

  pod-07:
    build: ./pod-agent
    container_name: sanjeevani-pod-07
    depends_on: *pod_dependencies
    ports:
      - "8007:8000"
    environment:
      POD_ID: POD-07
      POD_NAME: Supply Warehouse Pod
      POD_REGION: Region-07
      SATELLITE_URL: http://satellite:9100
      CELL_TOWERS: CELLTOWER-2=http://celltower-2:9202
      CONNECTED_TOWERS: CELLTOWER-2
      NEIGHBORS: http://pod-09:8000
      SIMULATION_CONTROLLER_URL: http://simulation-controller:9300
      COORDINATOR_INBOXES: hospital=http://hospital-2-coordinator:8000;workforce=http://workforce-1-coordinator:8000
    volumes:
      - ./pod-data/pod-07:/app/data
    networks:
      - sanjeevani-net

  pod-08:
    build: ./pod-agent
    container_name: sanjeevani-pod-08
    depends_on: *pod_dependencies
    ports:
      - "8008:8000"
    environment:
      POD_ID: POD-08
      POD_NAME: Medical Camp Pod
      POD_REGION: Region-08
      SATELLITE_URL: http://satellite:9100
      CELL_TOWERS: CELLTOWER-2=http://celltower-2:9202
      CONNECTED_TOWERS: CELLTOWER-2
      NEIGHBORS: ""
      SIMULATION_CONTROLLER_URL: http://simulation-controller:9300
      COORDINATOR_INBOXES: shelter=http://shelter-c-coordinator:8000
    volumes:
      - ./pod-data/pod-08:/app/data
    networks:
      - sanjeevani-net

  pod-09:
    build: ./pod-agent
    container_name: sanjeevani-pod-09
    depends_on: *pod_dependencies
    ports:
      - "8009:8000"
    environment:
      POD_ID: POD-09
      POD_NAME: High Ground Shelter Pod
      POD_REGION: Region-09
      SATELLITE_URL: http://satellite:9100
      CELL_TOWERS: ""
      CONNECTED_TOWERS: ""
      NEIGHBORS: http://pod-10:8000, http://pod-07:8000
      SIMULATION_CONTROLLER_URL: http://simulation-controller:9300
      COORDINATOR_INBOXES: shelter=http://shelter-c-coordinator:8000;workforce=http://workforce-2-coordinator:8000;flood=http://flood-coordinator-1:8000
    volumes:
      - ./pod-data/pod-09:/app/data
    networks:
      - sanjeevani-net

  pod-10:
    build: ./pod-agent
    container_name: sanjeevani-pod-10
    depends_on: *pod_dependencies
    ports:
      - "8010:8000"
    environment:
      POD_ID: POD-10
      POD_NAME: Mobile Relay Pod
      POD_REGION: Region-10
      SATELLITE_URL: http://satellite:9100
      CELL_TOWERS: ""
      CONNECTED_TOWERS: ""
      NEIGHBORS: http://pod-09:8000
      SIMULATION_CONTROLLER_URL: http://simulation-controller:9300
    volumes:
      - ./pod-data/pod-10:/app/data
    networks:
      - sanjeevani-net

  hospital-1-coordinator:
    build: ./coordinators
    container_name: sanjeevani-hospital-1-coordinator
    depends_on: *pod_dependencies
    ports:
      - "8101:8000"
    environment:
      COORDINATOR_ID: HOSPITAL-01
      COORDINATOR_NAME: Hospital 1 Command
      COORDINATOR_ROLE: hospital
      COORDINATOR_REGION: Medical North Range
      COVERAGE_NODES: POD-02,POD-06
      SATELLITE_URL: http://satellite:9100
      CELL_TOWERS: CELLTOWER-1=http://celltower-1:9201
      CONNECTED_TOWERS: CELLTOWER-1
      NEIGHBORS: http://pod-02:8000,http://pod-06:8000
      SIMULATION_CONTROLLER_URL: http://simulation-controller:9300
    volumes:
      - ./coordinator-data/hospital-01:/app/data
    networks:
      - sanjeevani-net

  hospital-2-coordinator:
    build: ./coordinators
    container_name: sanjeevani-hospital-2-coordinator
    depends_on: *pod_dependencies
    ports:
      - "8102:8000"
    environment:
      COORDINATOR_ID: HOSPITAL-02
      COORDINATOR_NAME: Hospital 2 Command
      COORDINATOR_ROLE: hospital
      COORDINATOR_REGION: Medical South Range
      COVERAGE_NODES: POD-04,POD-07
      SATELLITE_URL: http://satellite:9100
      CELL_TOWERS: ""
      CONNECTED_TOWERS: ""
      NEIGHBORS: http://pod-04:8000,http://pod-07:8000
      SIMULATION_CONTROLLER_URL: http://simulation-controller:9300
    volumes:
      - ./coordinator-data/hospital-02:/app/data
    networks:
      - sanjeevani-net

  shelter-a-coordinator:
    build: ./coordinators
    container_name: sanjeevani-shelter-a-coordinator
    depends_on: *pod_dependencies
    ports:
      - "8103:8000"
    environment:
      COORDINATOR_ID: SHELTER-A
      COORDINATOR_NAME: Shelter A Camp
      COORDINATOR_ROLE: shelter
      COORDINATOR_REGION: Shelter West Range
      COVERAGE_NODES: POD-01,POD-05,POD-04
      SATELLITE_URL: http://satellite:9100
      CELL_TOWERS: ""
      CONNECTED_TOWERS: ""
      NEIGHBORS: http://pod-01:8000,http://pod-05:8000,http://pod-04:8000
      SIMULATION_CONTROLLER_URL: http://simulation-controller:9300
    volumes:
      - ./coordinator-data/shelter-a:/app/data
    networks:
      - sanjeevani-net

  shelter-b-coordinator:
    build: ./coordinators
    container_name: sanjeevani-shelter-b-coordinator
    depends_on: *pod_dependencies
    ports:
      - "8104:8000"
    environment:
      COORDINATOR_ID: SHELTER-B
      COORDINATOR_NAME: Shelter B Camp
      COORDINATOR_ROLE: shelter
      COORDINATOR_REGION: Shelter Ridge Range
      COVERAGE_NODES: POD-06,CELLTOWER-1
      SATELLITE_URL: http://satellite:9100
      CELL_TOWERS: CELLTOWER-1=http://celltower-1:9201
      CONNECTED_TOWERS: CELLTOWER-1
      NEIGHBORS: http://pod-06:8000
      SIMULATION_CONTROLLER_URL: http://simulation-controller:9300
    volumes:
      - ./coordinator-data/shelter-b:/app/data
    networks:
      - sanjeevani-net

  shelter-c-coordinator:
    build: ./coordinators
    container_name: sanjeevani-shelter-c-coordinator
    depends_on: *pod_dependencies
    ports:
      - "8105:8000"
    environment:
      COORDINATOR_ID: SHELTER-C
      COORDINATOR_NAME: Shelter C Camp
      COORDINATOR_ROLE: shelter
      COORDINATOR_REGION: Shelter East Range
      COVERAGE_NODES: POD-08,POD-09,CELLTOWER-2
      SATELLITE_URL: http://satellite:9100
      CELL_TOWERS: CELLTOWER-2=http://celltower-2:9202
      CONNECTED_TOWERS: CELLTOWER-2
      NEIGHBORS: http://pod-08:8000,http://pod-09:8000
      SIMULATION_CONTROLLER_URL: http://simulation-controller:9300
    volumes:
      - ./coordinator-data/shelter-c:/app/data
    networks:
      - sanjeevani-net

  workforce-1-coordinator:
    build: ./coordinators
    container_name: sanjeevani-workforce-1-coordinator
    depends_on: *pod_dependencies
    ports:
      - "8106:8000"
    environment:
      COORDINATOR_ID: WORKFORCE-01
      COORDINATOR_NAME: Workforce Camp 1
      COORDINATOR_ROLE: workforce
      COORDINATOR_REGION: Workforce East Range
      COVERAGE_NODES: POD-07,CELLTOWER-2
      SATELLITE_URL: http://satellite:9100
      CELL_TOWERS: CELLTOWER-2=http://celltower-2:9202
      CONNECTED_TOWERS: CELLTOWER-2
      NEIGHBORS: http://pod-07:8000
      SIMULATION_CONTROLLER_URL: http://simulation-controller:9300
    volumes:
      - ./coordinator-data/workforce-01:/app/data
    networks:
      - sanjeevani-net

  workforce-2-coordinator:
    build: ./coordinators
    container_name: sanjeevani-workforce-2-coordinator
    depends_on: *pod_dependencies
    ports:
      - "8107:8000"
    environment:
      COORDINATOR_ID: WORKFORCE-02
      COORDINATOR_NAME: Workforce Camp 2
      COORDINATOR_ROLE: workforce
      COORDINATOR_REGION: Workforce High Ground Range
      COVERAGE_NODES: POD-09
      SATELLITE_URL: http://satellite:9100
      CELL_TOWERS: CELLTOWER-2=http://celltower-2:9202
      CONNECTED_TOWERS: CELLTOWER-2
      NEIGHBORS: http://pod-09:8000
      SIMULATION_CONTROLLER_URL: http://simulation-controller:9300
    volumes:
      - ./coordinator-data/workforce-02:/app/data
    networks:
      - sanjeevani-net

  fire-coordinator:
    build: ./coordinators
    container_name: sanjeevani-fire-coordinator
    depends_on: *pod_dependencies
    ports:
      - "8108:8000"
    environment:
      COORDINATOR_ID: FIRE-01
      COORDINATOR_NAME: Fire Coordinator
      COORDINATOR_ROLE: fire
      COORDINATOR_REGION: Fire Route Range
      COVERAGE_NODES: POD-05,CELLTOWER-1
      SATELLITE_URL: http://satellite:9100
      CELL_TOWERS: CELLTOWER-1=http://celltower-1:9201
      CONNECTED_TOWERS: CELLTOWER-1
      NEIGHBORS: http://pod-05:8000
      SIMULATION_CONTROLLER_URL: http://simulation-controller:9300
    volumes:
      - ./coordinator-data/fire-01:/app/data
    networks:
      - sanjeevani-net

  flood-coordinator-1:
    build: ./coordinators
    container_name: sanjeevani-flood-coordinator-1
    depends_on: *pod_dependencies
    ports:
      - "8109:8000"
    environment:
      COORDINATOR_ID: FLOOD-01
      COORDINATOR_NAME: Flood Coordinator 1
      COORDINATOR_ROLE: flood
      COORDINATOR_REGION: Flood Rescue Range
      COVERAGE_NODES: POD-06,POD-09
      SATELLITE_URL: http://satellite:9100
      CELL_TOWERS: ""
      CONNECTED_TOWERS: ""
      NEIGHBORS: http://pod-06:8000,http://pod-09:8000
      SIMULATION_CONTROLLER_URL: http://simulation-controller:9300
    volumes:
      - ./coordinator-data/flood-01:/app/data
    networks:
      - sanjeevani-net

  sensor-simulator:
    build: ./sensor-simulator
    container_name: sanjeevani-sensor-simulator
    depends_on:
      - pod-01
      - pod-02
      - pod-03
      - pod-04
      - pod-05
      - pod-06
      - pod-07
      - pod-08
      - pod-09
      - pod-10
    ports:
      - "9500:9400"
    environment:
      PORT: 9400
      TICK_MS: 4000
    networks:
      - sanjeevani-net

networks:
  sanjeevani-net:
    name: sanjeevani-net

volumes:
  mongo-data:
