services:
  redis:
    image: redis:7-alpine
    container_name: sanjeevani_redis

  control-center:
    build: ./control-center
    container_name: control_center
    ports: ["9000:9000"]
    environment:
      REDIS_URL: redis://redis:6379
      RELAYS: "satellite=http://satellite:8000,cell_tower_1=http://cell_tower_1:8000,cell_tower_2=http://cell_tower_2:8000"
      POD_URLS: "pod1=http://pod1:8000,pod2=http://pod2:8000,pod3=http://pod3:8000,pod4=http://pod4:8000"
      WEBEX_TOKEN: "${WEBEX_TOKEN:-}"
      WEBEX_ROOM_ID: "${WEBEX_ROOM_ID:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ANTHROPIC_MODEL: "${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}"
    depends_on: [redis]

  satellite:
    build: ./relay
    container_name: satellite
    ports: ["9101:8000"]
    environment: { NAME: satellite, LATENCY_MS: "80", CC_URL: "http://control-center:9000" }

  cell_tower_1:
    build: ./relay
    container_name: cell_tower_1
    ports: ["9102:8000"]
    environment: { NAME: cell_tower_1, LATENCY_MS: "30", CC_URL: "http://control-center:9000" }

  cell_tower_2:
    build: ./relay
    container_name: cell_tower_2
    ports: ["9103:8000"]
    environment: { NAME: cell_tower_2, LATENCY_MS: "30", CC_URL: "http://control-center:9000" }

  pod1:
    build: ./pod-agent
    container_name: pod1
    ports: ["9201:8000"]
    environment:
      POD_ID: pod1
      SITE: "Riverside School Shelter"
      SATELLITE_URL: "http://satellite:8000"
      TOWER_URL: "http://cell_tower_1:8000"
      NEIGHBORS: "http://pod2:8000"
      CC_PUBKEY_URL: "http://control-center:9000/pubkey"

  pod2:
    build: ./pod-agent
    container_name: pod2
    ports: ["9202:8000"]
    environment:
      POD_ID: pod2
      SITE: "Community Hall Shelter"
      SATELLITE_URL: "http://satellite:8000"
      TOWER_URL: "http://cell_tower_1:8000"
      NEIGHBORS: "http://pod1:8000,http://pod3:8000"
      CC_PUBKEY_URL: "http://control-center:9000/pubkey"

  pod3:
    build: ./pod-agent
    container_name: pod3
    ports: ["9203:8000"]
    environment:
      POD_ID: pod3
      SITE: "District Hospital Camp"
      SATELLITE_URL: "http://satellite:8000"
      TOWER_URL: "http://cell_tower_2:8000"
      NEIGHBORS: "http://pod2:8000,http://pod4:8000"
      CC_PUBKEY_URL: "http://control-center:9000/pubkey"

  pod4:
    build: ./pod-agent
    container_name: pod4
    ports: ["9204:8000"]
    environment:
      POD_ID: pod4
      SITE: "Hilltop Relief Center"
      SATELLITE_URL: "http://satellite:8000"
      TOWER_URL: "http://cell_tower_2:8000"
      NEIGHBORS: "http://pod3:8000"
      CC_PUBKEY_URL: "http://control-center:9000/pubkey"
