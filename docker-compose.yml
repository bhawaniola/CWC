services:
  cloud-api:
    build: ./cloud-api
    container_name: sanjeevani-cloud-api
    ports:
      - "9000:9000"
    environment:
      POD_URLS: "POD-01=http://pod-01:8000,POD-02=http://pod-02:8000,POD-03=http://pod-03:8000,POD-04=http://pod-04:8000,POD-05=http://pod-05:8000,POD-06=http://pod-06:8000,POD-07=http://pod-07:8000,POD-08=http://pod-08:8000,POD-09=http://pod-09:8000,POD-10=http://pod-10:8000"
    networks:
      - sanjeevani-net

  satellite:
    build: ./link-node
    container_name: sanjeevani-satellite
    depends_on:
      - cloud-api
    ports:
      - "9100:9100"
    environment:
      LINK_ID: satellite
      LINK_TYPE: satellite
      PORT: 9100
      CLOUD_URL: http://cloud-api:9000
    networks:
      - sanjeevani-net

  celltower-1:
    build: ./link-node
    container_name: sanjeevani-celltower-1
    depends_on:
      - cloud-api
    ports:
      - "9201:9201"
    environment:
      LINK_ID: CELLTOWER-1
      LINK_TYPE: cellular
      PORT: 9201
      CLOUD_URL: http://cloud-api:9000
    networks:
      - sanjeevani-net

  celltower-2:
    build: ./link-node
    container_name: sanjeevani-celltower-2
    depends_on:
      - cloud-api
    ports:
      - "9202:9202"
    environment:
      LINK_ID: CELLTOWER-2
      LINK_TYPE: cellular
      PORT: 9202
      CLOUD_URL: http://cloud-api:9000
    networks:
      - sanjeevani-net

  simulation-controller:
    build: ./simulation-controller
    container_name: sanjeevani-simulation-controller
    depends_on:
      - satellite
      - celltower-1
      - celltower-2
    ports:
      - "9300:9300"
    environment:
      SATELLITE_URL: http://satellite:9100
      CELLTOWER_1_URL: http://celltower-1:9201
      CELLTOWER_2_URL: http://celltower-2:9202
      SATELLITE_CONTAINER: sanjeevani-satellite
      CELLTOWER_1_CONTAINER: sanjeevani-celltower-1
      CELLTOWER_2_CONTAINER: sanjeevani-celltower-2
      DOCKER_SOCKET: /var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - sanjeevani-net

  pod-01:
    build: ./pod-agent
    container_name: sanjeevani-pod-01
    depends_on: &pod_dependencies
      - cloud-api
      - satellite
      - celltower-1
      - celltower-2
      - simulation-controller
    ports:
      - "8001:8000"
    environment:
      POD_ID: POD-01
      POD_NAME: District Command Pod
      POD_REGION: Region-01
      SATELLITE_URL: http://satellite:9100
      CELL_TOWERS: CELLTOWER-1=http://celltower-1:9201
      CONNECTED_TOWERS: CELLTOWER-1
      NEIGHBORS: http://pod-02:8000
      SIMULATION_CONTROLLER_URL: http://simulation-controller:9300
    volumes:
      - ./pod-data/pod-01:/app/data
    networks:
      - sanjeevani-net

  pod-02:
    build: ./pod-agent
    container_name: sanjeevani-pod-02
    depends_on: *pod_dependencies
    ports:
      - "8002:8000"
    environment:
      POD_ID: POD-02
      POD_NAME: Hospital Relief Pod
      POD_REGION: Region-02
      SATELLITE_URL: http://satellite:9100
      CELL_TOWERS: CELLTOWER-1=http://celltower-1:9201
      CONNECTED_TOWERS: CELLTOWER-1
      NEIGHBORS: http://pod-01:8000,http://pod-03:8000
      SIMULATION_CONTROLLER_URL: http://simulation-controller:9300
    volumes:
      - ./pod-data/pod-02:/app/data
    networks:
      - sanjeevani-net

  pod-03:
    build: ./pod-agent
    container_name: sanjeevani-pod-03
    depends_on: *pod_dependencies
    ports:
      - "8003:8000"
