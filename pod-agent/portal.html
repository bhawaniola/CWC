<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SANJEEVANI — {{SITE}}</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 0; background: #f4f6f8; color: #1a2733; }
  header { background: #0d274d; color: #fff; padding: 14px 18px; }
  header h1 { margin: 0; font-size: 20px; } header p { margin: 2px 0 0; opacity: .8; font-size: 13px; }
  main { max-width: 640px; margin: 0 auto; padding: 16px; }
  .banner { padding: 10px 14px; border-radius: 8px; margin-bottom: 14px; font-size: 14px; }
  .peacetime { background: #e1f5ee; color: #085041; }
  .disaster  { background: #fcebeb; color: #791f1f; font-weight: 600; }
  .island    { background: #faeeda; color: #633806; }
  .card { background: #fff; border: 1px solid #dde3ea; border-radius: 10px; padding: 14px; margin-bottom: 14px; }
  textarea { width: 100%; box-sizing: border-box; min-height: 70px; font-size: 16px; padding: 8px;
             border: 1px solid #c9d2db; border-radius: 8px; }
  button { background: #049fd9; color: #fff; border: 0; border-radius: 8px; padding: 10px 16px;
           font-size: 15px; cursor: pointer; margin-top: 8px; }
  button.mic { background: #0d274d; margin-left: 8px; }
  .alert { border-left: 4px solid #1d9e75; background: #e1f5ee; padding: 8px 12px; margin: 6px 0;
           font-size: 14px; border-radius: 0 8px 8px 0; }
  .alert .v { color: #085041; font-weight: 600; font-size: 12px; }
  .req { border-bottom: 1px solid #eef1f4; padding: 8px 0; font-size: 14px; }
  .sev { display: inline-block; min-width: 22px; text-align: center; border-radius: 6px;
         color: #fff; font-size: 12px; padding: 2px 5px; margin-right: 6px; }
  .muted { color: #5f6b7a; font-size: 12px; }
</style>
</head>
<body>
<header>
  <h1>SANJEEVANI relief portal</h1>
  <p>{{SITE}} · {{POD_ID}}</p>
</header>
<main>
  <div id="banner" class="banner peacetime">Checking status…</div>

  <div class="card" id="alerts-card" style="display:none">
    <strong>Official alerts</strong>
    <div id="alerts"></div>
  </div>

  <div class="card">
    <strong>Need help? Type or speak your emergency.</strong>
    <textarea id="text" placeholder="e.g. My grandfather needs insulin, we are near the east gate"></textarea>
    <div>
      <button onclick="send()">Request assistance</button>
      <button class="mic" onclick="speak()" id="micbtn">🎤 Speak</button>
    </div>
    <div id="result" class="muted" style="margin-top:8px"></div>
  </div>

  <div class="card">
    <strong>Your requests</strong>
    <div id="reqs" class="muted">None yet.</div>
  </div>
</main>
<script>
const sevColor = s => s >= 8 ? '#a32d2d' : s >= 5 ? '#ba7517' : '#0f6e56';

async function refresh() {
  try {
    const s = await (await fetch('/status')).json();
    const b = document.getElementById('banner');
    if (s.tier === 'T0') {
      b.className = 'banner island';
      b.textContent = 'OFFLINE (island mode) — your requests are saved locally and will send automatically. Queue: ' + s.queue_len;
    } else if (s.mode === 'disaster') {
      b.className = 'banner disaster';
      b.textContent = 'DISASTER MODE — connected via ' + (s.path || '?') + ' (' + s.tier + ')';
    } else {
      b.className = 'banner peacetime';
      b.textContent = 'Peacetime — community Wi-Fi active · ' + (s.path || 'connecting') + ' (' + s.tier + ')';
    }
    const ac = document.getElementById('alerts-card');
    if (s.alerts && s.alerts.length) {
      ac.style.display = '';
      document.getElementById('alerts').innerHTML = s.alerts.map(a =>
        `<div class="alert"><span class="v">✓ Verified: District EOC · #${a.seq}</span><br>${a.message}</div>`).join('');
    }
    const reqs = await (await fetch('/my-requests')).json();
    if (reqs.length) {
      document.getElementById('reqs').innerHTML = reqs.slice().reverse().map(r =>
        `<div class="req"><span class="sev" style="background:${sevColor(r.severity)}">${r.severity}</span>
         ${r.text}<br><span class="muted">${r.category} · ${r.status}</span></div>`).join('');
    }
  } catch (e) { /* pod restarting */ }
}
setInterval(refresh, 2000); refresh();

async function send() {
  const text = document.getElementById('text').value.trim();
  if (!text) return;
  const r = await (await fetch('/request', { method: 'POST',
    headers: {'Content-Type': 'application/json'}, body: JSON.stringify({text}) })).json();
  document.getElementById('result').textContent =
    `Severity ${r.severity}/10 (${r.category}) — ${r.status}`;
  document.getElementById('text').value = '';
  refresh();
}

function speak() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Speech input not supported in this browser — please type.'); return; }
  const rec = new SR(); rec.lang = 'en-IN';
  document.getElementById('micbtn').textContent = '🎤 Listening…';
  rec.onresult = e => {
    document.getElementById('text').value = e.results[0][0].transcript;
    document.getElementById('micbtn').textContent = '🎤 Speak';
  };
  rec.onerror = () => document.getElementById('micbtn').textContent = '🎤 Speak';
  rec.start();
}
</script>
</body>
</html>
