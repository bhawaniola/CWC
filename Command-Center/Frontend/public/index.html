<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SANJEEVANI — Command Center</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">S</div>
      <div>
        <h1>SANJEEVANI</h1>
        <small>Self-Healing Lifeline Network</small>
      </div>
    </div>
    <nav class="nav" id="nav">
      <a href="#/dashboard"><span class="ico">▦</span> Dashboard</a>
      <a href="#/requests"><span class="ico">▤</span> Requests <span class="badge" id="nav-req">0</span></a>
      <a href="#/network"><span class="ico">◈</span> Network</a>
      <a href="#/resources"><span class="ico">▣</span> Resources</a>
      <a href="#/alerts"><span class="ico">◔</span> Alerts <span class="badge" id="nav-alert">0</span></a>
    </nav>
    <div class="sys-health">
      <div><span class="dot">●</span> System health: <b id="sys-state">Healthy</b></div>
      <div class="muted" id="sys-sync" style="margin-top:6px">Last synced: —</div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="topstat">
        <div class="ico">◉</div>
        <div><small>Pods online</small><b id="top-pods">— / —</b></div>
      </div>
      <div class="topstat">
        <div class="ico">◍</div>
        <div><small>Current mode</small><b id="top-mode">—</b></div>
      </div>
      <div class="topstat">
        <div class="ico">▲</div>
        <div><small>Network health</small><b id="top-health">—</b></div>
      </div>
      <div class="spacer"></div>
      <div class="who">
        <b>Admin User</b>
        <span class="muted">Command Center</span>
      </div>
    </div>
    <div class="content" id="view"><p class="muted">Loading…</p></div>
  </div>
</div>
<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
</body>
</html>
