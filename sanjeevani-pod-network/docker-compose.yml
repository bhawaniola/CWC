      - pod-02
      - pod-03
      - pod-04
      - pod-05
      - pod-06
      - pod-07
      - pod-08
      - pod-09
      - pod-10
    ports:
      - "8100:8100"
    environment:
      PORT: 8100
      MANAGER_API_KEY: sanjeevani-manager-demo-key
      PODS: POD-01=http://pod-01:8000,POD-02=http://pod-02:8000,POD-03=http://pod-03:8000,POD-04=http://pod-04:8000,POD-05=http://pod-05:8000,POD-06=http://pod-06:8000,POD-07=http://pod-07:8000,POD-08=http://pod-08:8000,POD-09=http://pod-09:8000,POD-10=http://pod-10:8000
