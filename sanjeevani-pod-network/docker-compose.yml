services:
  cloud-api:
    build: ./cloud-api
    container_name: sanjeevani-cloud-api
    ports:
      - "9000:9000"

  pod-01:
    build: ./pod-agent
    container_name: sanjeevani-pod-01
    depends_on:
      - cloud-api
    ports:
      - "8001:8000"
    environment:
      POD_ID: POD-01
      POD_NAME: District Command Pod
      POD_REGION: Region-01
      CLOUD_URL: http://cloud-api:9000
      NEIGHBORS: http://pod-02:8000,http://pod-03:8000
      MANAGER_API_KEY: sanjeevani-manager-demo-key
    volumes:
      - ./pod-data/pod-01:/app/data

  pod-02:
    build: ./pod-agent
    container_name: sanjeevani-pod-02
    depends_on:
      - cloud-api
